name: docker

# Build the gateway image on GitHub's native amd64 runners (no local Docker /
# QEMU needed) and push it to GHCR. Triggered on every push to main, on version
# tags, and manually.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

# Don't stack builds: a newer push supersedes an in-flight one.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          # TrueNAS SCALE is amd64. Add linux/arm64 here if your NAS is ARM.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache image layers between runs. (The Dockerfile's cargo cache mounts
          # don't persist across ephemeral runners, so a source change triggers a
          # full release build — a few minutes on native amd64.)
          cache-from: type=gha
          cache-to: type=gha,mode=max
